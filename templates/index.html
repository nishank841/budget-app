<!DOCTYPE html>
<html>

<head>
    <title>Budget Tracker</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        table {
            border-collapse: collapse;
            width: 60%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background: #f4f4f4;
        }

        h2 {
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <h1>Monthly Budget Tracker</h1>

    <h2>Total this month: ${{ total }}</h2>

    <form method="POST">
        <input name="item" placeholder="Item (e.g. groceries)" required>
        <input name="amount" placeholder="Amount ($)" type="number" step="0.01" required>
        <button type="submit">Add</button>
    </form>

    <h2>Items</h2>

    <table>
        <tr>
            <th>Date</th>
            <th>Item</th>
            <th>Amount ($)</th>
        </tr>
        {% for e in expenses %}
        <tr>
            <td>{{ e.date }}</td>
            <td>{{ e.item }}</td>
            <td>{{ e.amount }}</td>
        </tr>
        {% endfor %}
    </table>

</body>

</html>
